<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptool - Secure Viewer</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h1>Cryptool</h1>
        </header>

        <div class="tabs">
            <button id="tab-decrypt" class="tab-btn active">Decrypt</button>
            <button id="tab-encrypt" class="tab-btn">Encrypt</button>
        </div>

        <div id="setup-view" class="card">
            <div id="decrypt-section">
                <div class="input-group">
                    <label for="file-input">Encrypted File</label>
                    <div id="drop-zone" class="file-drop-zone">
                        <p class="file-info">Click or drag & drop file here</p>
                        <input type="file" id="file-input" accept=".enc,.txt,.memo">
                    </div>
                </div>
            </div>

            <div id="encrypt-section" style="display: none;">
                <div class="input-group">
                    <label for="plain-text-input">Plain Text</label>
                    <textarea id="plain-text-input" placeholder="Type or paste your memo here..." rows="8" class="memo-textarea"></textarea>
                    <div style="margin-top: 0.5rem; text-align: right;">
                        <label for="text-file-input" class="text-file-label">Or load from file</label>
                        <input type="file" id="text-file-input" accept=".txt" style="display: none;">
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password / Key</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter key..." autocomplete="off">
                    <button id="toggle-password" class="icon-button" title="Toggle visibility">
                        <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <button id="decrypt-btn">Decrypt & Open</button>
            <button id="encrypt-btn" style="display: none;">Encrypt & Save</button>
        </div>

        <div id="viewer" class="card">
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Memo Content</label>
                    <div class="font-size-control">
                        <label for="font-size-slider" style="font-size: 0.75rem;">Font Size</label>
                        <input type="range" id="font-size-slider" min="0.8" max="2.0" step="0.1" value="1.2">
                    </div>
                </div>
                <div id="content-area" class="memo-content" tabindex="0"></div>
            </div>
            <button id="back-btn" style="background: transparent; border: 1px solid var(--border-color);">Close Memo</button>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Cryptool. Local only.
    </footer>

    <script src="libs/openpgp.min.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
